<!DOCTYPE html>

<head>

    <script src="react.min.js"></script>

    <script src="babel.min.js"></script>
    <script>
// IndexedDB 存储层
(function() {
    const DB_NAME = 'speech_contest_db';
    const DB_VERSION = 1;
    const STORE_GRADES = 'grades';
    const STORE_RESULTS = 'results';
    let dbInstance = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            if (dbInstance) { resolve(dbInstance); return; }
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => { dbInstance = request.result; resolve(dbInstance); };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(STORE_GRADES)) db.createObjectStore(STORE_GRADES, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(STORE_RESULTS)) db.createObjectStore(STORE_RESULTS, { keyPath: 'id', autoIncrement: true });
            };
        });
    }

    function dbPut(storeName, data) {
        return new Promise((resolve, reject) => {
            openDB().then(db => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                const request = store.put(data);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            }).catch(reject);
        });
    }

    function dbGet(storeName, key) {
        return new Promise((resolve, reject) => {
            openDB().then(db => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            }).catch(reject);
        });
    }

    window.SpeechContestDB = {
        saveGrades: (grades) => dbPut(STORE_GRADES, { id: 'all', data: grades }),
        loadGrades: () => new Promise(resolve => { dbGet(STORE_GRADES, 'all').then(r => resolve(r ? r.data : null)).catch(() => resolve(null)); }),
        saveResults: (results) => dbPut(STORE_RESULTS, { id: 'all', data: results }),
        loadResults: () => new Promise(resolve => { dbGet(STORE_RESULTS, 'all').then(r => resolve(r ? r.data : [])).catch(() => resolve([])); }),
        clearAllData: () => new Promise((resolve, reject) => {
            openDB().then(db => {
                const tx = db.transaction([STORE_GRADES, STORE_RESULTS], 'readwrite');
                tx.objectStore(STORE_GRADES).clear();
                tx.objectStore(STORE_RESULTS).clear();
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }),
        openDB
    };
})();
    </script>
    <style>

<body>
    <div id="root"></div>
    {/* 自动加载config.json的文件选择框 */}
    <input 
        type="file" 
        ref={fileInputRef}
        accept=".json,application/json" 
        style={{display: 'none'}}
        onChange={handleAutoConfigLoad}
    />
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const STORAGE_KEY = 'speech_contest_grades';
        
        const defaultGrades = [
            {
                id: '1',
                name: '中低年段',
                subtitle: '好吃的水果',
                students: [],
                recognition: { images: [], count: 3, scoreOptions: [3, 2, 1, 0] },
                discrimination: { bigImages: [], smallImages: [], count: 3, scoreOptions: [3, 0] },
                expression: { images: [], count: 3, scoreOptions: [3, 2, 1, 0] },
                imageSelect: { images: [], count: 3, scoreOptions: [3, 0] }
            },
            {
                id: '2',
                name: '高年段',
                subtitle: '我们的住房',
                students: [],
                recognition: { images: [], count: 3, scoreOptions: [3, 2, 1, 0] },
                discrimination: { bigImages: [], smallImages: [], count: 3, scoreOptions: [3, 0] },
                expression: { images: [], count: 3, scoreOptions: [3, 2, 1, 0] },
                imageSelect: { images: [], count: 3, scoreOptions: [3, 0] }
            },
            {
                id: '3',
                name: '无语言',
                subtitle: '无语言学生专项',
                students: [],
                recognition: { images: [], count: 0, scoreOptions: [] },
                discrimination: { bigImages: [], smallImages: [], count: 3, scoreOptions: [3, 0] },
                expression: { images: [], count: 0, scoreOptions: [] },
                imageSelect: { images: [], count: 3, scoreOptions: [3, 0] }
            }
        ];
        
        function App() {
            const [grades, setGrades] = useState([]);
            const [selectedGrade, setSelectedGrade] = useState(null);
            const [currentTab, setCurrentTab] = useState('basic');
            const [selectedBigImage, setSelectedBigImage] = useState(null);
            const [uploading, setUploading] = useState(false);
            const fileInputRef = useRef(null);
            const [configLoaded, setConfigLoaded] = useState(false);
            
            // 页面加载时自动弹出文件选择框
            useEffect(() => {
                // 延迟200ms触发，让页面先渲染完成
                setTimeout(() => {
                    if (fileInputRef.current) {
                        fileInputRef.current.click();
                    }
                }, 200);
            }, []);
            
            // 处理自动加载config.json
            const handleAutoConfigLoad = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // 检查文件名是否是config.json
                if (file.name === 'config.json') {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (data.grades && Array.isArray(data.grades)) {
                                setGrades(data.grades);
                                window.SpeechContestDB.saveGrades(data.grades);
                                setConfigLoaded(true);
                            }
                        } catch (err) {
                            // 文件格式错误，忽略
                        }
                    };
                    reader.readAsText(file);
                } else {
                    // 非config.json文件，也尝试加载
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (data.grades && Array.isArray(data.grades)) {
                                setGrades(data.grades);
                                window.SpeechContestDB.saveGrades(data.grades);
                                setConfigLoaded(true);
                            }
                        } catch (err) {
                            // 文件格式错误，忽略
                        }
                    };
                    reader.readAsText(file);
                }
                // 重置input允许重复选择同一文件
                e.target.value = '';
            };
            
            // 初始加载数据
            useEffect(() => {
                window.SpeechContestDB.loadGrades().then(saved => {
                    if (saved && saved.length > 0) {
                        setGrades(saved);
                    } else {
                        setGrades(defaultGrades);
                        window.SpeechContestDB.saveGrades(defaultGrades);
                    }
                });
            }, []);
            
            const saveGrades = (newGrades) => {
                // 同步更新UI，异步保存到IndexedDB
                setGrades(newGrades);
                window.SpeechContestDB.saveGrades(newGrades);
            };
            
            // 导出所有数据为JSON文件
            const exportData = () => {
                const exportObj = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    grades: grades
                };
                const jsonStr = JSON.stringify(exportObj);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'speech-contest-backup-' + new Date().toISOString().slice(0,10) + '.json';
                a.click();
                URL.revokeObjectURL(url);
            };
            
            // 保存到config.json（固定文件名，换电脑时直接读取）
            const saveToConfig = () => {
                const exportObj = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    grades: grades
                };
                const jsonStr = JSON.stringify(exportObj);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'config.json';
                a.click();
                URL.revokeObjectURL(url);
                alert('配置已保存到 config.json\n换电脑后，将 config.json 与 admin.html 放在同一目录，然后打开 admin.html 即可自动加载配置。');
            };
            
            // 加载config.json文件
            
            // 从JSON文件导入数据
            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.grades && Array.isArray(data.grades)) {
                            setGrades(data.grades);
                            window.SpeechContestDB.saveGrades(data.grades);
                            alert('导入成功！共 ' + data.grades.length + ' 个年级');
                        } else {
                            alert('文件格式错误：找不到 grades 数组');
                        }
                    } catch (err) {
                        alert('导入失败：' + err.message);
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // 清空input允许重复选择同一文件
            };
            
            const editGrade = (grade) => {
                setSelectedGrade(grade);
                setCurrentTab('basic');
                setSelectedBigImage(null);
            };
            
            const updateGrade = (field, value) => {
                const newGrades = grades.map(g => 
                    g.id === selectedGrade.id ? { ...g, [field]: value } : g
                );
                saveGrades(newGrades);
                setSelectedGrade({ ...selectedGrade, [field]: value });
            };
            
            const addStudent = (name) => {
                if (!name.trim()) return;
                const newStudent = { id: Date.now().toString(), name: name.trim() };
                const newStudents = [...(selectedGrade.students || []), newStudent];
                updateGrade('students', newStudents);
            };
            
            const removeStudent = (id) => {
                const newStudents = (selectedGrade.students || []).filter(s => s.id !== id);
                updateGrade('students', newStudents);
            };
            
            const handleImageUpload = (e, field) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                setUploading(true);
                // 本地存储：转为Base64后存入IndexedDB
                Promise.all(files.map(file => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            resolve({
                                id: Date.now() + Math.random(),
                                url: event.target.result, // Base64 data URL
                                name: file.name,
                                label: '' // label字段，识图选一专用
                            });
                        };
                        reader.onerror = () => reject(new Error('读取文件失败'));
                        reader.readAsDataURL(file);
                    });
                })).then((newImages) => {
                    setUploading(false);
                    if (field === 'recognition' || field === 'expression') {
                        const currentImages = selectedGrade[field]?.images || [];
                        updateGrade(field, { ...selectedGrade[field], images: [...currentImages, ...newImages] });
                    } else if (field === 'bigImages') {
                        const currentImages = selectedGrade.discrimination?.bigImages || [];
                        const newWithCorrect = newImages.map(img => ({ ...img, correctSmallId: null }));
                        updateGrade('discrimination', { ...selectedGrade.discrimination, bigImages: [...currentImages, ...newWithCorrect] });
                    } else if (field === 'smallImages') {
                        const currentImages = selectedGrade.discrimination?.smallImages || [];
                        updateGrade('discrimination', { ...selectedGrade.discrimination, smallImages: [...currentImages, ...newImages] });
                    } else if (field === 'imageSelect') {
                        const currentImages = selectedGrade.imageSelect?.images || [];
                        updateGrade('imageSelect', { ...selectedGrade.imageSelect, images: [...currentImages, ...newImages] });
                    }
                }).catch(err => {
                    setUploading(false);
                    alert('上传失败: ' + err.message);
                });
            };
            
            const removeImage = (field, imageId) => {
                // 找到要删除的图片URL
                // 更新本地状态（Base64存储无需删除服务器文件）
                if (field === 'recognition' || field === 'expression') {
                    const currentImages = selectedGrade[field]?.images || [];
                    updateGrade(field, { ...selectedGrade[field], images: currentImages.filter(img => img.id !== imageId) });
                } else if (field === 'bigImages') {
                    const currentImages = selectedGrade.discrimination?.bigImages || [];
                    updateGrade('discrimination', { ...selectedGrade.discrimination, bigImages: currentImages.filter(img => img.id !== imageId) });
                } else if (field === 'smallImages') {
                    const currentImages = selectedGrade.discrimination?.smallImages || [];
                    updateGrade('discrimination', { ...selectedGrade.discrimination, smallImages: currentImages.filter(img => img.id !== imageId) });
                }
            };
            
            // 选择大图进行标记
            const selectBigImage = (bigImg) => {
                setSelectedBigImage(bigImg);
            };
            
            // 标记正确小图
            const markCorrectSmall = (smallImg) => {
                if (!selectedBigImage) return;
                
                // 更新大图的correctSmallId
                const updatedBigImages = selectedGrade.discrimination.bigImages.map(big => 
                    big.id === selectedBigImage.id ? { ...big, correctSmallId: smallImg.id } : big
                );
                updateGrade('discrimination', { ...selectedGrade.discrimination, bigImages: updatedBigImages });
                setSelectedBigImage({ ...selectedBigImage, correctSmallId: smallImg.id });
            };
            
            // 清除标记
            const clearMarking = () => {
                if (!selectedBigImage) return;
                const updatedBigImages = selectedGrade.discrimination.bigImages.map(big => 
                    big.id === selectedBigImage.id ? { ...big, correctSmallId: null } : big
                );
                updateGrade('discrimination', { ...selectedGrade.discrimination, bigImages: updatedBigImages });
                setSelectedBigImage({ ...selectedBigImage, correctSmallId: null });
            };
            
            // 获取已标记正确图片的大图数量
            const getMarkedCount = () => {
                return (selectedGrade?.discrimination?.bigImages || []).filter(b => b.correctSmallId).length;
            };
            
            const renderGradeList = () => (
                <div className="card">
                    <div className="card-header">
                        <span className="card-title">📚 年段配置</span>
                    </div>
                    {grades.length === 0 ? (
                        <div className="empty-state">暂无年段，请刷新页面初始化</div>
                    ) : (
                        grades.map(grade => (
                            <div key={grade.id} className="grade-card">
                                <h3>{grade.name}</h3>
                                <p className="subtitle">{grade.subtitle}</p>
                                <button className="btn" onClick={() => editGrade(grade)}>编辑</button>
                            </div>
                        ))
                    )}
                </div>
            );
            
            const renderEditPage = () => {
                const isImageSelectOnly = selectedGrade?.id === '3'; // 无语言只显示辨一辨和识图选一
                const steps = [
                    { key: 'basic', label: '基础' },
                    ...(isImageSelectOnly ? [] : [{ key: 'recognition', label: '认一认' }]),
                    { key: 'discrimination', label: '辨一辨' },
                    ...(isImageSelectOnly ? [{ key: 'imageSelect', label: '识图选一' }] : [{ key: 'expression', label: '说一说' }]),
                    { key: 'students', label: '学生' }
                ];

                                            <button className="edit-btn" onClick={() => {
                                                const newLabel = prompt('请输入该图片的物品名称（label）', img.label || '');
                                                if (newLabel !== null) {
                                                    const updatedImages = selectedGrade.imageSelect.images.map(im => 
                                                        im.id === img.id ? { ...im, label: newLabel.trim() } : im
                                                    );
                                                    updateGrade('imageSelect', { ...selectedGrade.imageSelect, images: updatedImages });
                                                }
                                            }}>✎</button>
                                            <button className="remove-btn" onClick={() => removeImage('imageSelect', img.id)}>×</button>
                                        </div>
                                    ))}
                                </div>
                                {(selectedGrade?.imageSelect?.images || []).length === 0 && (
                                    <div className="empty-state">暂无图片，请上传（至少需要2张）</div>
                                )}
                                    <div style={{background: '#e8f5e9', padding: '12px', borderRadius: '10px', marginBottom: '15px', textAlign: 'center'}}>
                                        <span style={{fontSize: '14px', color: '#2e7d32'}}>
                                            💡 每个图片需要设置 label（物品名称），系统会随机选一个 label 作为题目
                                        </span>
                                        <div style={{marginTop: '8px', fontSize: '12px', color: '#555'}}>
                                            已设置 label 的图片：{(selectedGrade?.imageSelect?.images || []).filter(img => img.label && img.label.trim()).length} / {(selectedGrade?.imageSelect?.images || []).length}
                                        </div>
                                    </div>
                                {(selectedGrade?.imageSelect?.images || []).length > 0 && (selectedGrade?.imageSelect?.images || []).length < 2 && (
                                    <div style={{textAlign: 'center', padding: '10px', color: '#dc3545', background: '#f8d7da', borderRadius: '10px', marginTop: '10px'}}>
                                        ⚠️ 图片数量不足，至少需要2张图片才能进行二选一
                                    </div>
                                )}
                                {(selectedGrade?.imageSelect?.images || []).filter(img => img.label && img.label.trim()).length < 2 && (selectedGrade?.imageSelect?.images || []).length >= 2 && (
                                    <div style={{textAlign: 'center', padding: '10px', color: '#dc3545', background: '#f8d7da', borderRadius: '10px', marginTop: '10px'}}>
                                        ⚠️ 至少需要2张设置了 label 的图片才能开始答题
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {currentTab === 'students' && (
                            <div>
                                <div className="form-group" style={{display: 'flex', gap: '10px'}}>
                                    <input 
                                        type="text" 
                                        className="form-input"
                                        placeholder="输入学生姓名，按回车添加"
                                        onKeyPress={(e) => {
                                            if (e.key === 'Enter') {
                                                addStudent(e.target.value);
                                                e.target.value = '';
                                            }
                                        }}
                                    />
                                    <button className="btn btn-success" onClick={() => {
                                        const input = document.querySelector('.form-input');
                                        addStudent(input.value);
                                        input.value = '';
                                    }}>添加</button>
                                </div>
                                <div className="student-list">
                                    {(selectedGrade?.students || []).map(student => (
                                        <div key={student.id} className="student-tag">
                                            <span className="name">{student.name}</span>
                                            <button className="delete" onClick={() => removeStudent(student.id)}>×</button>
                                        </div>
                                    ))}
                                </div>
                                {(!selectedGrade?.students || selectedGrade.students.length === 0) && (
                                    <div className="empty-state mt-20">暂无学生，请添加</div>
                                )}
                            </div>
                        )}
                    </div>
                    
                    <div className="card config-preview">
                        <h4>📋 当前配置预览</h4>
                        <div className="config-item">
                            <span>年段名称</span>
                            <span>{selectedGrade?.name}</span>
                        </div>
                        <div className="config-item">
                            <span>认一认图片</span>
                            <span>{selectedGrade?.recognition?.images?.length || 0} 张 / 分数选项 {selectedGrade?.recognition?.scoreOptions?.join(', ') || '3,2,1,0'}</span>
                        </div>
                        <div className="config-item">
                            <span>辨一辨大图</span>
                            <span>{selectedGrade?.discrimination?.bigImages?.length || 0} 张（已标记 {getMarkedCount()} 个）</span>
                        </div>
                        <div className="config-item">
                            <span>辨一辨小图</span>
                            <span style={{color: (selectedGrade?.discrimination?.smallImages?.length || 0) < 3 ? '#dc3545' : '#28a745'}}>
                                {selectedGrade?.discrimination?.smallImages?.length || 0} 张
                                {(selectedGrade?.discrimination?.smallImages?.length || 0) < 3 && ' ⚠️ 至少需要3张'}
                            </span>
                        </div>
                        <div className="config-item">
                            <span>辨一辨分数</span>
                            <span>{selectedGrade?.discrimination?.scoreOptions?.join(', ') || '3,0'}</span>
                        </div>
                        <div className="config-item">
                            <span>说一说图片</span>
                            <span>{selectedGrade?.expression?.images?.length || 0} 张 / 分数选项 {selectedGrade?.expression?.scoreOptions?.join(', ') || '3,2,1,0'}</span>
                        </div>
                        <div className="config-item">
                            <span>识图选一图片</span>
                            <span>{selectedGrade?.imageSelect?.images?.length || 0} 张 / 分数选项 {selectedGrade?.imageSelect?.scoreOptions?.join(', ') || '3,0'}</span>
                        </div>
                        <div className="config-item">
                            <span>学生人数</span>
                            <span>{selectedGrade?.students?.length || 0} 人</span>
                        </div>
                    </div>
                </div>
                );
            };
            
            return (
                <div className="container">
                    <h1 className="page-title">⚙️ 后台管理</h1>
                    
                    {/* 数据保存按钮 */}
                    <div className="card" style={{marginBottom: '20px', background: '#f0f9ff'}}>
                        <div style={{display: 'flex', justifyContent: 'center', gap: '15px', flexWrap: 'wrap'}}>
                            <button className="btn btn-success" onClick={saveToConfig}>💾 保存配置到 config.json</button>
                            <label className="btn btn-secondary" style={{cursor: 'pointer'}}>
                                📥 导入配置
                                <input type="file" accept=".json" onChange={importData} style={{display: 'none'}} />
                            </label>
                        </div>
                        <p style={{textAlign: 'center', color: '#666', fontSize: '12px', marginTop: '10px'}}>
                            保存配置后，将 config.json 和 admin.html 一起拷贝到其他电脑即可使用
                        </p>
                    </div>
                    
                    {selectedGrade ? renderEditPage() : renderGradeList()}
                    <div className="card mt-20">
                        <div className="text-center">
                            <p style={{color: '#666', marginBottom: '10px'}}>使用说明：</p>
                            <p style={{color: '#999', fontSize: '14px'}}>
                                1. 选择年段进行编辑<br/>
                                2. 上传各环节图片<br/>
                                3. 辨一辨需要标记大图对应的正确答案<br/>
                                4. 添加学生名单<br/>
                                5. 保存后用 index.html 开始比赛
                            </p>
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
