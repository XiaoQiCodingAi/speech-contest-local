    <script>
// IndexedDB 存储层
(function() {
    const DB_NAME = 'speech_contest_db';
    const DB_VERSION = 1;
    const STORE_GRADES = 'grades';
    const STORE_RESULTS = 'results';
    let dbInstance = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            if (dbInstance) { resolve(dbInstance); return; }
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => { dbInstance = request.result; resolve(dbInstance); };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(STORE_GRADES)) db.createObjectStore(STORE_GRADES, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(STORE_RESULTS)) db.createObjectStore(STORE_RESULTS, { keyPath: 'id', autoIncrement: true });
            };
        });
    }

    function dbPut(storeName, data) {
        return new Promise((resolve, reject) => {
            openDB().then(db => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                const request = store.put(data);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            }).catch(reject);
        });
    }

    function dbGet(storeName, key) {
        return new Promise((resolve, reject) => {
            openDB().then(db => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            }).catch(reject);
        });
    }

    window.SpeechContestDB = {
        saveGrades: (grades) => dbPut(STORE_GRADES, { id: 'all', data: grades }),
        loadGrades: () => new Promise(resolve => { dbGet(STORE_GRADES, 'all').then(r => resolve(r ? r.data : null)).catch(() => resolve(null)); }),
        saveResults: (results) => dbPut(STORE_RESULTS, { id: 'all', data: results }),
        loadResults: () => new Promise(resolve => { dbGet(STORE_RESULTS, 'all').then(r => resolve(r ? r.data : [])).catch(() => resolve([])); }),
        clearAllData: () => new Promise((resolve, reject) => {
            openDB().then(db => {
                const tx = db.transaction([STORE_GRADES, STORE_RESULTS], 'readwrite');
                tx.objectStore(STORE_GRADES).clear();
                tx.objectStore(STORE_RESULTS).clear();
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }),
        openDB
    };
})();
    </script>

<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // 数据存储key
        const STORAGE_KEYS = {
            GRADES: 'speech_contest_grades',
            RESULTS: 'speech_contest_results',
            CURRENT_SESSION: 'speech_contest_session'
        };
        
        // 默认数据
        const defaultGrades = [
            {
                id: '1',
                name: '中低年段',
                subtitle: '好吃的水果',
                recognition: { images: [], count: 3 },
                discrimination: { groups: [], count: 3 },
                expression: { images: [], count: 3 }
            },
            {
                id: '2',
                name: '高年段',
                subtitle: '我们的住房',
                recognition: { images: [], count: 3 },
                discrimination: { groups: [], count: 3 },
                expression: { images: [], count: 3 }
            }
        ];
        
        function App() {
            const [screen, setScreen] = useState('home'); // home, select-grade, random, game, result, stats, review
            const [grades, setGrades] = useState([]);
            const [selectedGrade, setSelectedGrade] = useState(null);
            const [currentRound, setCurrentRound] = useState(0); // 环节索引，根据年级动态变化
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0); // 当前题目在当前环节中的索引
            const [students, setStudents] = useState([]);
            const [currentStudent, setCurrentStudent] = useState(null);
            const [currentScores, setCurrentScores] = useState({ r: [], d: [], e: [], s: [] }); // r:认一认, d:辨一辨, e:说一说, s:识图选一
            const [discriminationDetail, setDiscriminationDetail] = useState([]); // [{studentChoiceId, correctId, questionImgUrl}]
            const [imageSelectDetail, setImageSelectDetail] = useState([]); // [{studentChoiceId, correctId, questionImgUrl}]
            const [results, setResults] = useState([]);
            const [feedback, setFeedback] = useState({ show: false, correct: null, message: '' });
            const [tempName, setTempName] = useState(''); // 临时点名
            const [rolling, setRolling] = useState(false);
            const [reviewResult, setReviewResult] = useState(null); // 复盘用的成绩记录
            
            // 当前环节图片
            const [currentImages, setCurrentImages] = useState([]);
            const [discriminationOptions, setDiscriminationOptions] = useState([]);
            const [correctOptionIndex, setCorrectOptionIndex] = useState(null); // 辨一辨正确答案索引
            const [selectedOption, setSelectedOption] = useState(null);
            const [isTransitioning, setIsTransitioning] = useState(false);
            
            const [usedRecogIds, setUsedRecogIds] = useState(new Set()); // 认一认已用图片ID
            const [usedDiscBigIds, setUsedDiscBigIds] = useState(new Set()); // 辨一辨已用大图ID
            const [usedExprIds, setUsedExprIds] = useState(new Set()); // 说一说已用图片ID
            
            // 识图选一专用状态
            const [imageSelectPair, setImageSelectPair] = useState([]); // 当前左右两张图片
            const [imageSelectCorrect, setImageSelectCorrect] = useState(null); // 正确答案索引 (0或1)
            const [imageSelectTarget, setImageSelectTarget] = useState(null); // 当前题目label
            const [currentBigImg, setCurrentBigImg] = useState(null); // 当前辨一辨大图（用于记录详情）
            const [usedImageSelectLabels, setUsedImageSelectLabels] = useState(new Set()); // 识图选一已用label集合（去重）
            
            const rollInterval = useRef(null);
            
            // 获取当前年级的环节顺序
            const getGradeRounds = () => {
                if (!selectedGrade) return [];
                const rounds = [];
                // 只有无语言(id=3)才包含识图选一
                if (selectedGrade.id === '3' && (selectedGrade.imageSelect?.count || 0) > 0) rounds.push('imageSelect');
                if ((selectedGrade.recognition?.count || 0) > 0) rounds.push('recognition');
                if ((selectedGrade.discrimination?.count || 0) > 0) rounds.push('discrimination');
                if ((selectedGrade.expression?.count || 0) > 0) rounds.push('expression');
                return rounds;
            };
            
            // 监听screen和currentRound和currentQuestionIndex变化，自动准备回合
            useEffect(() => {
                console.log('useEffect触发, screen=', screen, 'currentRound=', currentRound, 'currentQuestionIndex=', currentQuestionIndex, 'selectedGrade=', selectedGrade ? selectedGrade.id : 'null');
                if (screen === 'game' && selectedGrade) {
                    console.log('调用prepareRound');
                    prepareRound();
                }
                // 复盘模式下，设置currentScores为记录的详情
                if (screen === 'review' && reviewResult && reviewResult.scoresDetail) {
                    setCurrentScores(reviewResult.scoresDetail);
                    // 根据记录恢复selectedGrade
                    if (reviewResult.gradeId && grades.length > 0) {
                        const matched = grades.find(g => g.id === reviewResult.gradeId);
                        if (matched) setSelectedGrade(matched);
                    }
                }
            }, [screen, currentRound, currentQuestionIndex]);
            
            // 加载数据
            useEffect(() => {
                // 优先从 config.json 加载（两个页面共用同一配置）
                fetch('config.json')
                    .then(res => {
                        if (!res.ok) throw new Error('config.json not found');
                        return res.json();
                    })
                    .then(data => {
                        if (data.grades && Array.isArray(data.grades)) {
                            setGrades(data.grades);
                            window.SpeechContestDB.saveGrades(data.grades);
                        } else {
                            throw new Error('invalid format');
                        }
                    })
                    .catch(() => {
                        // config.json 不存在，从 IndexedDB 加载
                        window.SpeechContestDB.loadGrades().then(savedGrades => {
                            if (savedGrades) setGrades(savedGrades);
                        });
                    });
                
                window.SpeechContestDB.loadResults().then(savedResults => {
                    if (savedResults && savedResults.length > 0) {
                        setResults(savedResults);
                    }
                });
            }, []);
            
            // 保存成绩
            const saveResults = (newResults) => {
                // 同步更新UI，异步保存到IndexedDB
                setResults(newResults);
                window.SpeechContestDB.saveResults(newResults);
            };
            
            // 选择年级
            const selectGrade = (grade) => {
                setSelectedGrade(grade);
                // 收集该年级学生
                const gradeStudents = grade.students || [];
                setStudents(gradeStudents);
                setScreen('random');
            };
            
            // 开始随机点名
            const startRolling = () => {
                if (students.length === 0) {
                    alert('该年级没有学生，请先在后台添加学生');
                    return;
                }
                setRolling(true);
                let count = 0;
                const maxCount = 20;
                rollInterval.current = setInterval(() => {
                    const randomIndex = Math.floor(Math.random() * students.length);
                    setTempName(students[randomIndex].name);
                    count++;
                    if (count >= maxCount) {
                        clearInterval(rollInterval.current);
                        setRolling(false);
                    }
                }, 100);
            };
            
            // 确认学生
            const confirmStudent = () => {
                console.log('confirmStudent调用, tempName:', tempName, 'selectedGrade:', selectedGrade?.id);
                if (!tempName) return;
                setCurrentStudent(tempName);
                setCurrentScores({ r: [], d: [], e: [], s: [] });
                setCurrentRound(0);
                setCurrentQuestionIndex(0);
                setSelectedOption(null);
                setCorrectOptionIndex(null);
                setIsTransitioning(false);
                setUsedImageSelectLabels(new Set());
                setImageSelectPair([]);
                setImageSelectCorrect(null);
                setImageSelectTarget(null);
                // prepareRound will be called by useEffect when screen changes
                setScreen('game');
            };
            
            // 准备当前回合
            const prepareRound = () => {
                console.log('prepareRound执行, currentRound:', currentRound, 'selectedGrade.id:', selectedGrade?.id);
                if (!selectedGrade) { console.log('selectedGrade为空'); return; }
                
                const rounds = getGradeRounds();
                if (rounds.length === 0) {
                    alert('该年级未配置任何环节');
                    return;
                }
                
                const currentRoundKey = rounds[currentRound];
                console.log('当前环节:', currentRoundKey, '总环节:', rounds);
                
                if (currentRoundKey === 'recognition') {
                    // 认一认 - 防重复
                    const allImgs = selectedGrade.recognition?.images || [];
                    if (allImgs.length === 0) {
                        alert('请先在后台添加认一认图片');
                        return;
                    }
                    const availableImgs = allImgs.filter(img => !usedRecogIds.has(img.id));
                    if (availableImgs.length === 0) {
                        // 所有图片都用过了，重置
                        setUsedRecogIds(new Set());
                        const randomIndex = Math.floor(Math.random() * allImgs.length);
                        const img = allImgs[randomIndex];
                        setUsedRecogIds(new Set([img.id]));
                        setCurrentImages([img]);
                    } else {
                        const randomIndex = Math.floor(Math.random() * availableImgs.length);
                        const img = availableImgs[randomIndex];
                        setUsedRecogIds(prev => new Set([...prev, img.id]));
                        setCurrentImages([img]);
                    }
                    setImageSelectPair([]);
                    setImageSelectCorrect(null);
                    setDiscriminationOptions([]);
                    setCorrectOptionIndex(null);
                    
                } else if (currentRoundKey === 'imageSelect') {
                    // 识图选一：按label分组抽题
                    const allImgs = selectedGrade.imageSelect?.images || [];
                    // 只使用有label的图片
                    const labeledImgs = allImgs.filter(img => img.label && img.label.trim());
                    
                    if (labeledImgs.length < 2) {
                        alert('识图选一需要至少2张设置了label的图片');
                        return;
                    }
                    
                    // 按label分组
                    const labelMap = {};
                    labeledImgs.forEach(img => {
                        if (!labelMap[img.label]) labelMap[img.label] = [];
                        labelMap[img.label].push(img);
                    });
                    const availableLabels = Object.keys(labelMap).filter(l => !usedImageSelectLabels.has(l));
                    
                    if (availableLabels.length === 0) {
                        // 所有label都用过了，重置
                        setUsedImageSelectLabels(new Set());
                        return prepareRound();
                    }
                    
                    // 随机选一个label作为题目
                    const targetLabel = availableLabels[Math.floor(Math.random() * availableLabels.length)];
                    const targetImgs = labelMap[targetLabel];
                    
                    // 从目标label中随机选1张作正确答案
                    const correctImg = targetImgs[Math.floor(Math.random() * targetImgs.length)];
                    
                    // 从其他label中随机选1张作干扰项
                    const otherLabels = Object.keys(labelMap).filter(l => l !== targetLabel);
                    const otherLabel = otherLabels[Math.floor(Math.random() * otherLabels.length)];
                    const wrongImg = labelMap[otherLabel][Math.floor(Math.random() * labelMap[otherLabel].length)];
                    
                    // 随机排列两张图
                    const pair = Math.random() < 0.5 ? [correctImg, wrongImg] : [wrongImg, correctImg];
                    const correctIdx = pair[0].id === correctImg.id ? 0 : 1;
                    
                    setImageSelectPair(pair);
                    setImageSelectCorrect(correctIdx);
                    setImageSelectTarget(targetLabel);
                    setCurrentImages([]);
                    setDiscriminationOptions([]);
                    setCorrectOptionIndex(null);
                    
                } else if (currentRoundKey === 'discrimination') {
                    console.log('进入辨一辨逻辑块');
                    // 辨一辨：使用标记的正确图片（防重复）
                    const allBigImgs = selectedGrade.discrimination?.bigImages || [];
                    const smallImgs = selectedGrade.discrimination?.smallImages || [];
                    
                    // 只使用已标记正确答案的大图
                    const validBigImgs = allBigImgs.filter(b => b.correctSmallId);
                    
                    if (validBigImgs.length === 0 || smallImgs.length < 3) {
                        console.log('校验失败: validBigImgs=', validBigImgs.length, 'smallImgs=', smallImgs.length);
                        alert('请先在后台配置辨一辨：上传大图并标记正确答案');
                        return;
                    }
                    
                    // 防重复：只从未用过的大图中选
                    const availableBigImgs = validBigImgs.filter(b => !usedDiscBigIds.has(b.id));
                    let questionImg;
                    if (availableBigImgs.length === 0) {
                        // 所有大图都用过了，重置
                        setUsedDiscBigIds(new Set());
                        const randomIndex = Math.floor(Math.random() * validBigImgs.length);
                        questionImg = validBigImgs[randomIndex];
                        setUsedDiscBigIds(new Set([questionImg.id]));
                    } else {
                        const randomIndex = Math.floor(Math.random() * availableBigImgs.length);
                        questionImg = availableBigImgs[randomIndex];
                        setUsedDiscBigIds(prev => new Set([...prev, questionImg.id]));
                    }
                    setCurrentImages([questionImg]);
                    setCurrentBigImg(questionImg); // 记录当前大图用于结果详情
                    setImageSelectPair([]);
                    setImageSelectCorrect(null);
                    console.log('辨一辨调试:', {
                        questionImg,
                        correctSmallId: questionImg.correctSmallId,
                        smallImgsIds: smallImgs.map(s => ({id: s.id, url: s.url?.slice(0,50)}))
                    });
                    
                    // 找到该大图对应的正确答案小图
                    const correctSmallImg = smallImgs.find(s => s.id === questionImg.correctSmallId);
                    console.log('correctSmallImg查找结果:', correctSmallImg, '查找id:', questionImg.correctSmallId);
                    if (!correctSmallImg) {
                        alert('正确答案图片未找到，请重新标记');
                        return;
                    }
                    
                    // 从剩余小图中随机选2个作为错误选项
                    const wrongSmallImgs = smallImgs
                        .filter(s => s.id !== questionImg.correctSmallId)
                        .sort(() => Math.random() - 0.5)
                        .slice(0, 2);
                    
                    // 3个选项打乱顺序
                    const allOptions = [correctSmallImg, ...wrongSmallImgs];
                    const shuffledOptions = [...allOptions].sort(() => Math.random() - 0.5);
                    
                    // 找出正确答案打乱后的位置
                    const newCorrectIndex = shuffledOptions.findIndex(opt => opt.id === correctSmallImg.id);
                    console.log('设置选项:', { shuffledOptions, newCorrectIndex });
                    setDiscriminationOptions(shuffledOptions);
                    setCorrectOptionIndex(newCorrectIndex);
                    
                } else {
                    // 说一说 - 防重复
                    const allImgs = selectedGrade.expression?.images || [];
                    if (allImgs.length === 0) {
                        alert('请先在后台添加说一说图片');
                        return;
                    }
                    const availableImgs = allImgs.filter(img => !usedExprIds.has(img.id));
                    let img;
                    if (availableImgs.length === 0) {
                        // 所有图片都用过了，重置
                        setUsedExprIds(new Set());
                        const randomIndex = Math.floor(Math.random() * allImgs.length);
                        img = allImgs[randomIndex];
                        setUsedExprIds(new Set([img.id]));
                    } else {
                        const randomIndex = Math.floor(Math.random() * availableImgs.length);
                        img = availableImgs[randomIndex];
                        setUsedExprIds(prev => new Set([...prev, img.id]));
                    }
                    setCurrentImages([img]);
                    setImageSelectPair([]);
                    setImageSelectCorrect(null);
                    setDiscriminationOptions([]);
                    setCorrectOptionIndex(null);
                }
                setSelectedOption(null);
            };
            
            // 预加载图片（静默预加载，不影响当前显示）
            const preloadImages = (images) => {
                images.forEach(img => {
                    const preload = new Image();
                    preload.src = img.url;
                });
            };
            
            // 辨一辨选择选项
            const handleOptionSelect = (option, index) => {
                if (selectedOption !== null || isTransitioning) return; // 已选择或过渡中
                setIsTransitioning(true);
                
                setSelectedOption(index);
                const isCorrect = index === correctOptionIndex;
                
                // 根据配置的分数选项计算分数
                const scoreOptions = selectedGrade?.discrimination?.scoreOptions || [3, 0];
                const correctScore = scoreOptions[0];
                const wrongScore = scoreOptions.length > 1 ? scoreOptions[scoreOptions.length - 1] : 0;
                const earnedScore = isCorrect ? correctScore : wrongScore;
                
                const newScores = { ...currentScores, d: [...(currentScores.d || []), earnedScore] };
                setCurrentScores(newScores);
                // 记录辨一辨详情
                setDiscriminationDetail(prev => [...prev, {
                    studentChoiceId: option.id,
                    correctId: discriminationOptions[correctOptionIndex]?.id,
                    questionImgUrl: currentBigImg?.url
                }]);
                
                // 显示反馈
                showFeedback(isCorrect, earnedScore);
                
                // 3秒后进入下一题或下一环节
                const roundCount = selectedGrade?.discrimination?.count || 3;
                setTimeout(() => {
                    setSelectedOption(null);
                    const rounds = getGradeRounds();
                    if (currentQuestionIndex < roundCount - 1) {
                        setCurrentQuestionIndex(currentQuestionIndex + 1);
                    } else {
                        setCurrentQuestionIndex(0);
                        if (currentRound < rounds.length - 1) {
                            setCurrentRound(currentRound + 1);
                        } else {
                            finishGame(newScores);
                        }
                    }
                }, 2000);
                setTimeout(() => setIsTransitioning(false), 2500);
            };
            
            // 显示反馈
            const showFeedback = (correct, earnedScore = correct ? 3 : 0) => {
                setFeedback({
                    show: true,
                    correct,
                    message: correct ? `正确！+${earnedScore}分` : `错误！+${earnedScore}分`
                });
                setTimeout(() => {
                    setFeedback({ show: false, correct: null, message: '' });
                }, 1500);
            };
            
            // 认一认/说一说/识图选一评分
            const handleScore = (score, scoreKey) => {
                if (isTransitioning) return;
                setIsTransitioning(true);
                const newScores = { ...currentScores, [scoreKey]: [...(currentScores[scoreKey] || []), score] };
                setCurrentScores(newScores);
                
                const rounds = getGradeRounds();
                const currentRoundKey = rounds[currentRound];
                const roundCount = (selectedGrade && selectedGrade[currentRoundKey] && selectedGrade[currentRoundKey].count) || 3;
                
                // 识图选一：记录已用label
                if (currentRoundKey === 'imageSelect' && imageSelectTarget) {
                    const newUsed = new Set(usedImageSelectLabels);
                    newUsed.add(imageSelectTarget);
                    setUsedImageSelectLabels(newUsed);
                }
                
                // 检查是否完成当前环节所有题目
                if (currentQuestionIndex < roundCount - 1) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                } else {
                    setCurrentQuestionIndex(0);
                    if (currentRound < rounds.length - 1) {
                        setCurrentRound(currentRound + 1);
                    } else {
                        finishGame(newScores);
                    }
                }
                setTimeout(() => setIsTransitioning(false), 1000);
            };
            
            // 识图选一选择图片
            const handleImageSelect = (index) => {
                if (selectedOption !== null || isTransitioning) return;
                setIsTransitioning(true);
                
                setSelectedOption(index);
                const isCorrect = index === imageSelectCorrect;
                
                const scoreOptions = selectedGrade?.imageSelect?.scoreOptions || [3, 0];
                const correctScore = scoreOptions[0];
                const wrongScore = scoreOptions.length > 1 ? scoreOptions[scoreOptions.length - 1] : 0;
                const earnedScore = isCorrect ? correctScore : wrongScore;
                
                showFeedback(isCorrect, earnedScore);
                handleScore(earnedScore, 's');
                // 记录识图选一详情
                setImageSelectDetail(prev => [...prev, {
                    studentChoiceId: imageSelectPair[index]?.id,
                    correctId: imageSelectPair[imageSelectCorrect]?.id,
                    questionImgUrl: imageSelectPair[imageSelectCorrect]?.url
                }]);
            };
            
            // 完成游戏
            const finishGame = (scores) => {
                const rTotal = (scores.r || []).reduce((a, b) => a + b, 0);
                const sTotal = (scores.s || []).reduce((a, b) => a + b, 0);
                const dTotal = (scores.d || []).reduce((a, b) => a + b, 0);
                const eTotal = (scores.e || []).reduce((a, b) => a + b, 0);
                const total = rTotal + sTotal + dTotal + eTotal;
                const newResult = {
                    student: currentStudent,
                    gradeId: selectedGrade?.id,
                    gradeName: selectedGrade?.name || (selectedGrade?.id === '1' ? '中低年段' : selectedGrade?.id === '2' ? '高年段' : '无语言'),
                    scores: { r: rTotal, s: sTotal, d: dTotal, e: eTotal },
                    scoresDetail: scores,
                    discriminationDetail: discriminationDetail, // 辨一辨每题详情
                    imageSelectDetail: imageSelectDetail,   // 识图选一每题详情
                    total: total,
                    date: new Date().toLocaleDateString()
                };
                const newResults = [...results, newResult];
                saveResults(newResults);
                setScreen('result');
            };
            
            // 计算各环节分数总和
            const getRoundScore = (key) => (currentScores[key] || []).reduce((a, b) => a + b, 0);
            
            // 计算各环节最高分
            const getMaxScores = () => {
                if (!selectedGrade) return { r: 9, d: 9, e: 9, s: 9 };
                const rounds = getGradeRounds();
                let total = 0;
                let scores = {};
                if (rounds.includes('recognition')) {
                    scores.r = (selectedGrade.recognition?.scoreOptions || [3,2,1,0])[0] * (selectedGrade.recognition?.count || 3);
                    total += scores.r;
                }
                if (rounds.includes('imageSelect')) {
                    scores.s = (selectedGrade.imageSelect?.scoreOptions || [3,0])[0] * (selectedGrade.imageSelect?.count || 3);
                    total += scores.s;
                }
                if (rounds.includes('discrimination')) {
                    scores.d = (selectedGrade.discrimination?.scoreOptions || [3,0])[0] * (selectedGrade.discrimination?.count || 3);
                    total += scores.d;
                }
                if (rounds.includes('expression')) {
                    scores.e = (selectedGrade.expression?.scoreOptions || [3,2,1,0])[0] * (selectedGrade.expression?.count || 3);
                    total += scores.e;
                }
                return { ...scores, total };
            };
            
            // 下一位学生
            const nextStudent = () => {
                setCurrentStudent(null);
                setTempName('');
                setCurrentScores({ r: [], d: [], e: [], s: [] });
                setDiscriminationDetail([]);
                setImageSelectDetail([]);
                setCurrentRound(0);
                setCurrentQuestionIndex(0);
                setUsedRecogIds(new Set());
                setUsedDiscBigIds(new Set());
                setUsedExprIds(new Set());
                setUsedImageSelectLabels(new Set());
                setImageSelectPair([]);
                setScreen('random');
            };
            
            // 返回首页
            const goHome = () => {
                setScreen('home');
                setSelectedGrade(null);
                setCurrentStudent(null);
            };
            
            // 清空统计
            const clearStats = () => {
                if (confirm('确定要清空所有成绩吗？')) {
                    saveResults([]);
                }
            };
            
            // 渲染页面
            const renderScreen = () => {
                switch(screen) {
                    case 'home':
                        return (
                            <div className="container">
                                <h1 className="page-title">🎯 口语交际比赛</h1>
                                <div className="card">
                                    <div className="text-center">
                                        <button className="btn btn-large" onClick={() => setScreen('select-grade')}>
                                            🎮 开始比赛
                                        </button>
                                    </div>
                                    <div className="mt-20 text-center">
                                        <button className="btn btn-secondary btn-large" onClick={() => setScreen('stats')}>
                                            📊 查看统计
                                        </button>
                                    </div>
                                    <p className="text-center mt-20" style={{color: '#999', fontSize: '14px'}}>
                                        请确保已在后台配置好年段、学生和题库
                                    </p>
                                </div>
                            </div>
                        );
                    
                    case 'select-grade':
                        return (
                            <div className="container">
                                <h1 className="page-title">选择年段</h1>
                                <div className="card">
                                    {grades.length === 0 ? (
                                        <div className="empty-state">
                                            暂无配置，请先在 admin.html 中添加年段
                                        </div>
                                    ) : (
                                        grades.map(grade => (
                                            <div key={grade.id} style={{marginBottom: '15px'}}>
                                                <button 
                                                    className="btn btn-large" 
                                                    style={{width: '100%', background: 'linear-gradient(45deg, #6ecbf5, #4a9fd4)'}}
                                                    onClick={() => selectGrade(grade)}
                                                >
                                                    {grade.name} - {grade.subtitle}
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="text-center">
                                    <button className="btn btn-secondary" onClick={goHome}>返回</button>
                                </div>
                            </div>
                        );
                    
                    case 'random':
                        return (
                            <div className="container">
                                <h1 className="page-title">随机点名</h1>
                                <div className="card">
                                    <div className="random-name">
                                        {tempName || '点击按钮开始点名'}
                                    </div>
                                    <div className="text-center mt-20">
                                        <button className="btn btn-large btn-secondary" onClick={startRolling} disabled={rolling}>
                                            {rolling ? '随机中...' : '🎲 开始点名'}
                                        </button>
                                    </div>
                                    {tempName && (
                                        <div className="text-center mt-20">
                                            <button className="btn btn-success btn-large" onClick={confirmStudent}>
                                                ✓ 确认这位学生
                                            </button>
                                        </div>
                                    )}
                                </div>
                                <div className="text-center">
                                    <button className="btn btn-secondary" onClick={() => setScreen('select-grade')}>返回</button>
                                </div>
                            </div>
                        );
                    
                    case 'game': {
                        const rounds = getGradeRounds();
                        const currentRoundKey = rounds[currentRound];
                        const roundCount = (selectedGrade && selectedGrade[currentRoundKey] && selectedGrade[currentRoundKey].count) || 3;
                        
                        return (
                            <div className="container">
                                {/* 学生信息栏 */}
                                <div className="student-bar">
                                    <span>👤 {currentStudent}</span>
                                    <span>环节 {currentRound + 1}/{rounds.length} 第 {currentQuestionIndex + 1} 题</span>
                                </div>
                                
                                {/* 环节标题 */}
                                <div style={{marginBottom: '20px'}}>
                                    {currentRoundKey === 'recognition' && <div className="section-title section-1">📷 认一认</div>}
                                    {currentRoundKey === 'imageSelect' && <div className="section-title section-2">🔍 识图选一</div>}
                                    {currentRoundKey === 'discrimination' && <div className="section-title section-2">🔍 辨一辨</div>}
                                    {currentRoundKey === 'expression' && <div className="section-title section-3">🗣️ 说一说</div>}
                                </div>
                                
                                <div className="card">
                                    {/* 认一认 */}
                                    {currentRoundKey === 'recognition' && (
                                        <div>
                                            <div className="image-display">
                                                {currentImages[0] ? (
                                                    <img src={currentImages[0]?.url} alt="题目" onError={(e) => { e.target.style.display = 'none'; console.log('图片加载失败:', currentImages[0]?.url); }} />
                                                ) : (
                                                    <div style={{padding: '50px', textAlign: 'center', color: '#999'}}>
                                                        loading...
                                                    </div>
                                                )}
                                            </div>
                                            <p className="text-center" style={{margin: '20px 0', fontSize: '18px'}}>
                                                请说出这个物品的名称
                                            </p>
                                            <div className="text-center">
                                                {(selectedGrade?.recognition?.scoreOptions || [3, 2, 1, 0]).map((score, idx) => (
                                                    <button key={idx} className={`btn score-btn score-${score}`} onClick={() => handleScore(score, 'r')}>{score}分</button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    
                                    {/* 识图选一 */}
                                    {currentRoundKey === 'imageSelect' && (
                                        <div>
                                            <p className="text-center" style={{marginBottom: '20px', fontSize: '24px', fontWeight: 'bold', color: '#ff6b6b'}}>
                                                哪个是【{imageSelectTarget}】
                                            </p>
                                            <div style={{display: 'flex', justifyContent: 'center', gap: '30px', marginTop: '20px'}}>
                                                {imageSelectPair.length === 2 ? (
                                                    <>
                                                        <div 
                                                            className={`option-item ${selectedOption === 0 ? (imageSelectCorrect === 0 ? 'correct' : 'wrong') : ''}`}
                                                            onClick={() => handleImageSelect(0)}
                                                            style={{width: '200px', height: '200px'}}
                                                        >
                                                            <img src={imageSelectPair[0]?.url} alt="选项1" />
                                                        </div>
                                                        <div 
                                                            className={`option-item ${selectedOption === 1 ? (imageSelectCorrect === 1 ? 'correct' : 'wrong') : ''}`}
                                                            onClick={() => handleImageSelect(1)}
                                                            style={{width: '200px', height: '200px'}}
                                                        >
                                                            <img src={imageSelectPair[1]?.url} alt="选项2" />
                                                        </div>
                                                    </>
                                                ) : (
                                                    <div style={{textAlign: 'center', color: '#999', padding: '20px'}}>
                                                        加载中...
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                    
                                    {/* 辨一辨 */}
                                    {currentRoundKey === 'discrimination' && (
                                        <div>
                                            <p className="text-center" style={{marginBottom: '20px', fontSize: '20px'}}>
                                                找出与上面相同的类型
                                            </p>
                                            <div className="image-display" style={{width: '250px', height: '250px'}}>
                                                {currentImages[0] && <img src={currentImages[0]?.url} alt="题目" />}
                                            </div>
                                            <div className="options-container">
                                                {discriminationOptions.length === 0 ? (
                                                    <div style={{textAlign: 'center', color: '#999', padding: '20px'}}>
                                                        加载中...
                                                    </div>
                                                ) : discriminationOptions.map((option, index) => (
                                                    <div 
                                                        key={index}
                                                        className={`option-item ${
                                                            selectedOption === index ? 
                                                                (option.id === currentImages[0]?.id ? 'correct' : 'wrong') : ''
                                                        }`}
                                                        onClick={() => handleOptionSelect(option, index)}
                                                    >
                                                        <img src={option?.url} alt={`选项${index + 1}`} />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    
                                    {/* 说一说 */}
                                    {currentRoundKey === 'expression' && (
                                        <div>
                                            <div className="image-display">
                                                {currentImages[0] ? (
                                                    <img src={currentImages[0]?.url} alt="题目" />
                                                ) : (
                                                    <div style={{padding: '50px', textAlign: 'center', color: '#999'}}>
                                                        loading...
                                                    </div>
                                                )}
                                            </div>
                                            <p className="text-center" style={{margin: '20px 0', fontSize: '18px'}}>
                                                请描述这张图片
                                            </p>
                                            <div className="text-center">
                                                {(selectedGrade?.expression?.scoreOptions || [3, 2, 1, 0]).map((score, idx) => (
                                                    <button key={idx} className={`btn score-btn score-${score}`} onClick={() => handleScore(score, 'e')}>{score}分</button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    }
                    
                    case 'result': {
                        const rounds = getGradeRounds();
                        const maxScores = getMaxScores();
                        const total = getRoundScore('r') + getRoundScore('s') + getRoundScore('d') + getRoundScore('e');
                        
                        // 获取环节名称
                        const roundNames = { recognition: '认一认', imageSelect: '识图选一', discrimination: '辨一辨', expression: '说一说' };
                        const scoreKeyMap = { recognition: 'r', imageSelect: 's', discrimination: 'd', expression: 'e' };
                        
                        // 判断某题是否正确（根据分数判断：得最高分算对）
                        const isCorrectForRound = (key) => {
                            const sk = scoreKeyMap[key];
                            const scores = currentScores[sk] || [];
                            const options = selectedGrade?.[key]?.scoreOptions || [3, 0];
                            const maxScore = options[0];
                            return scores.map(s => s >= maxScore);
                        };
                        
                        const renderRoundResult = (key) => {
                            const sk = scoreKeyMap[key];
                            const scores = currentScores[sk] || [];
                            const maxScore = (selectedGrade?.[key]?.scoreOptions || [3, 0])[0];
                            const correctArr = isCorrectForRound(key);
                            const totalScore = getRoundScore(sk);
                            const correctCount = correctArr.filter(Boolean).length;
                            const isImageRound = key === 'imageSelect' || key === 'discrimination';
                            
                            return (
                                <div style={{marginBottom: '20px', padding: '15px', background: '#f8f9fa', borderRadius: '15px'}}>
                                    <div style={{fontSize: '16px', fontWeight: 'bold', color: '#333', marginBottom: '10px'}}>
                                        {roundNames[key]}
                                    </div>
                                    {/* 题目对错图标 */}
                                    <div style={{display: 'flex', gap: '8px', marginBottom: '10px', flexWrap: 'wrap'}}>
                                        {scores.map((score, idx) => (
                                            <div key={idx} style={{
                                                width: '36px', height: '36px', borderRadius: '50%',
                                                background: correctArr[idx] ? '#d4edda' : '#f8d7da',
                                                border: `2px solid ${correctArr[idx] ? '#28a745' : '#dc3545'}`,
                                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                fontSize: '18px', fontWeight: 'bold',
                                                color: correctArr[idx] ? '#28a745' : '#dc3545'
                                            }}>
                                                {correctArr[idx] ? '●' : '×'}
                                            </div>
                                        ))}
                                    </div>
                                    {/* 分数信息 */}
                                    <div style={{fontSize: '14px', color: '#666'}}>
                                        {isImageRound ? (
                                            <span style={{color: totalScore > 0 ? '#28a745' : '#dc3545'}}>
                                                得分：{totalScore}分（{correctCount}/{scores.length}题正确）
                                            </span>
                                        ) : (
                                            <span style={{color: '#ff6b6b'}}>
                                                得分：{totalScore}分
                                            </span>
                                        )}
                                    </div>
                                </div>
                            );
                        };
                        
                        return (
                            <div className="container">
                                <h1 className="page-title">答题完成</h1>
                                <div className="card">
                                    <div className="text-center">
                                        <p style={{fontSize: '24px', marginBottom: '10px'}}>👤 {currentStudent}</p>
                                        <p style={{fontSize: '18px', color: '#666'}}>答题结果</p>
                                    </div>
                                    
                                    {/* 各环节结果 */}
                                    <div style={{marginTop: '20px'}}>
                                        {rounds.map(key => renderRoundResult(key))}
                                    </div>
                                    
                                    <div className="result-total">
                                        总分：{total} / {maxScores.total} 分
                                    </div>
                                    
                                    <div className="text-center">
                                        <button className="btn btn-success btn-large" onClick={nextStudent}>
                                            下一位学生
                                        </button>
                                        <button className="btn btn-secondary btn-large" onClick={() => setScreen('stats')}>
                                            查看统计
                                        </button>
                                        <button className="btn btn-secondary" onClick={goHome}>
                                            返回首页
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    }
                    
                    case 'stats': {
                        // 折叠展开状态
                        const [expandedStudent, setExpandedStudent] = useState(null);
                        
                        // 按年级分组
                        const groupedResults = results.reduce((acc, result) => {
                            const gradeName = result.gradeName || (result.scores && result.scores.r !== undefined ? '中低年段' : '未知年段');
                            if (!acc[gradeName]) acc[gradeName] = [];
                            acc[gradeName].push(result);
                            return acc;
                        }, {});
                        
                        // 渲染某学生的结果卡
                        const renderResultCard = (result) => {
                            const detail = result.scoresDetail || {};
                            const gradeForCard = grades.find(g => g.id === result.gradeId) || selectedGrade;
                            const roundNames = { recognition: '认一认', imageSelect: '识图选一', discrimination: '辨一辨', expression: '说一说' };
                            const scoreKeyMap = { recognition: 'r', imageSelect: 's', discrimination: 'd', expression: 'e' };
                            const calcRoundScore = (key) => (detail[key] || []).reduce((a, b) => a + b, 0);
                            const calcMaxScore = (key) => {
                                const opts = gradeForCard?.[key]?.scoreOptions || [3, 0];
                                const cnt = gradeForCard?.[key]?.count || 3;
                                return opts[0] * cnt;
                            };
                            
                            // 渲染单环节
                            const renderRound = (key) => {
                                const sk = scoreKeyMap[key];
                                const scores = detail[sk] || [];
                                if (scores.length === 0) return null;
                                const opts = gradeForCard?.[key]?.scoreOptions || [3, 0];
                                const maxScore = opts[0];
                                const isGradual = opts.length > 2; // 3/2/1/0 是渐进
                                
                                // 认一认/说一说：显示图片+得分
                                if (key === 'recognition' || key === 'expression') {
                                    const imgs = gradeForCard?.[key]?.images || [];
                                    return (
                                        <div key={key} style={{marginBottom: '15px', padding: '10px', background: '#f8f9fa', borderRadius: '10px'}}>
                                            <div style={{fontSize: '14px', fontWeight: 'bold', color: '#333', marginBottom: '8px'}}>{roundNames[key]}  小计 {calcRoundScore(sk)}/{calcMaxScore(key)}</div>
                                            <div style={{display: 'flex', gap: '6px', flexWrap: 'wrap'}}>
                                                {scores.map((score, idx) => {
                                                    const img = imgs[idx];
                                                    return (
                                                        <div key={idx} style={{position: 'relative', width: '70px', textAlign: 'center'}}>
                                                            {img && <img src={img.url} alt={idx} style={{width: '60px', height: '60px', objectFit: 'cover', borderRadius: '6px', border: '2px solid #ddd'}} onClick={() => openLightbox(imgs, idx)} />}
                                                            <div style={{fontSize: '12px', marginTop: '2px', color: score === maxScore ? '#28a745' : score > 0 ? '#e67700' : '#dc3545'}}>
                                                                {score === maxScore ? '●' : score > 0 ? '⚠️' : '×'} {score}分
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                }
                                
                                // 辨一辨
                                if (key === 'discrimination') {
                                    const discDetail = result.discriminationDetail || [];
                                    return (
                                        <div key={key} style={{marginBottom: '15px', padding: '10px', background: '#f8f9fa', borderRadius: '10px'}}>
                                            <div style={{fontSize: '14px', fontWeight: 'bold', color: '#333', marginBottom: '8px'}}>{roundNames[key]}  小计 {calcRoundScore(sk)}/{calcMaxScore(key)}</div>
                                            <div style={{display: 'flex', gap: '6px', flexWrap: 'wrap'}}>
                                                {scores.map((score, idx) => {
                                                    const item = discDetail[idx] || {};
                                                    const isCorrect = score >= maxScore;
                                                    return (
                                                        <div key={idx} style={{position: 'relative', textAlign: 'center'}}>
                                                            {item.questionImgUrl && (
                                                                <div style={{position: 'relative', display: 'inline-block'}}>
                                                                    <img src={item.questionImgUrl} alt={idx} style={{width: '60px', height: '60px', objectFit: 'cover', borderRadius: '6px', border: isCorrect ? '3px solid #28a745' : '3px solid #dc3545'}} onClick={() => openLightboxDisc(result, idx)} />
                                                                    <span style={{position: 'absolute', top: '2px', left: '2px', background: '#28a745', color: 'white', borderRadius: '50%', width: '16px', height: '16px', fontSize: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>🟢</span>
                                                                    {!isCorrect && <span style={{position: 'absolute', top: '2px', right: '2px', background: '#dc3545', color: 'white', borderRadius: '50%', width: '16px', height: '16px', fontSize: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>🔴</span>}
                                                                </div>
                                                            )}
                                                            <div style={{fontSize: '12px', marginTop: '2px', color: isCorrect ? '#28a745' : '#dc3545'}}>
                                                                {isCorrect ? '●' : '×'} {score}分
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                }
                                
                                // 识图选一
                                if (key === 'imageSelect') {
                                    const imgDetail = result.imageSelectDetail || [];
                                    return (
                                        <div key={key} style={{marginBottom: '15px', padding: '10px', background: '#f8f9fa', borderRadius: '10px'}}>
                                            <div style={{fontSize: '14px', fontWeight: 'bold', color: '#333', marginBottom: '8px'}}>{roundNames[key]}  小计 {calcRoundScore(sk)}/{calcMaxScore(key)}</div>
                                            <div style={{display: 'flex', gap: '6px', flexWrap: 'wrap'}}>
                                                {scores.map((score, idx) => {
                                                    const item = imgDetail[idx] || {};
                                                    const isCorrect = score >= maxScore;
                                                    return (
                                                        <div key={idx} style={{position: 'relative', textAlign: 'center'}}>
                                                            {item.questionImgUrl && (
                                                                <div style={{position: 'relative', display: 'inline-block'}}>
                                                                    <img src={item.questionImgUrl} alt={idx} style={{width: '60px', height: '60px', objectFit: 'cover', borderRadius: '6px', border: isCorrect ? '3px solid #28a745' : '3px solid #dc3545'}} onClick={() => openLightboxImgSelect(result, idx)} />
                                                                    <span style={{position: 'absolute', top: '2px', left: '2px', background: '#28a745', color: 'white', borderRadius: '50%', width: '16px', height: '16px', fontSize: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>🟢</span>
                                                                    {!isCorrect && <span style={{position: 'absolute', top: '2px', right: '2px', background: '#dc3545', color: 'white', borderRadius: '50%', width: '16px', height: '16px', fontSize: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>🔴</span>}
                                                                </div>
                                                            )}
                                                            <div style={{fontSize: '12px', marginTop: '2px', color: isCorrect ? '#28a745' : '#dc3545'}}>
                                                                {isCorrect ? '●' : '×'} {score}分
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                }
                                
                                return null;
                            };
                            
                            const allRounds = ['recognition', 'imageSelect', 'discrimination', 'expression'];
                            const activeRounds = allRounds.filter(key => {
                                if (key === 'imageSelect') return gradeForCard?.id === '3' && (gradeForCard?.imageSelect?.count || 0) > 0;
                                return (gradeForCard?.[key]?.count || 0) > 0;
                            });
                            const maxTotal = activeRounds.reduce((sum, key) => sum + calcMaxScore(key), 0);
                            
                            return (
                                <div style={{marginTop: '10px', padding: '12px', background: '#fff', borderRadius: '10px', border: '2px solid #ff6b6b'}}>
                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px'}}>
                                        <div style={{fontSize: '18px', fontWeight: 'bold', color: '#333'}}>👤 {result.student}</div>
                                        <div style={{fontSize: '18px', fontWeight: 'bold', color: '#ff6b6b'}}>总分 {result.total}/{maxTotal}</div>
                                    </div>
                                    {activeRounds.map(key => renderRound(key))}
                                </div>
                            );
                        };
                        
                        // 大图预览
                        const [lightbox, setLightbox] = useState({ open: false, imgs: [], startIdx: 0 });
                        const openLightbox = (imgs, startIdx) => setLightbox({ open: true, imgs: imgs, startIdx });
                        const openLightboxDisc = (result, idx) => {
                            const discDetail = result.discriminationDetail || [];
                            const item = discDetail[idx] || {};
                            const bigImgs = (grades.find(g => g.id === result.gradeId) || selectedGrade)?.discrimination?.bigImages || [];
                            const startIndex = bigImgs.findIndex(b => b.url === item.questionImgUrl);
                            setLightbox({ open: true, imgs: bigImgs.map(b => ({url: b.url, id: b.id})), startIdx: startIndex >= 0 ? startIndex : 0 });
                        };
                        const openLightboxImgSelect = (result, idx) => {
                            const imgDetail = result.imageSelectDetail || [];
                            const item = imgDetail[idx] || {};
                            setLightbox({ open: true, imgs: [{url: item.questionImgUrl}], startIdx: 0 });
                        };
                        const prevImg = () => setLightbox(l => ({ ...l, startIdx: (l.startIdx - 1 + l.imgs.length) % l.imgs.length }));
                        const nextImg = () => setLightbox(l => ({ ...l, startIdx: (l.startIdx + 1) % l.imgs.length }));
                        
                        return (
                            <div className="container">
                                <h1 className="page-title">📊 结果统计</h1>
                                <div className="card">
                                    {results.length === 0 ? (
                                        <div className="empty-state">暂无成绩记录</div>
                                    ) : (
                                        Object.entries(groupedResults).map(([gradeName, gradeResults]) => (
                                            <div key={gradeName} style={{marginBottom: '20px'}}>
                                                <div style={{fontSize: '16px', fontWeight: 'bold', color: '#ff6b6b', marginBottom: '10px', paddingBottom: '5px', borderBottom: '2px solid #ff6b6b'}}>
                                                    {gradeName}（{gradeResults.length}人）
                                                </div>
                                                {gradeResults.map((result, index) => (
                                                    <div key={index}>
                                                        <div className="stats-item" onClick={() => setExpandedStudent(expandedStudent === index ? null : index)} style={{cursor: 'pointer'}}>
                                                            <div>
                                                                <div className="name">{result.student} {expandedStudent === index ? '▲' : '▼'}</div>
                                                                <div style={{fontSize: '12px', color: '#999'}}>{result.date}</div>
                                                            </div>
                                                            <div className="score">{result.total}分</div>
                                                        </div>
                                                        {expandedStudent === index && renderResultCard(result)}
                                                    </div>
                                                ))}
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="text-center">
                                    <button className="btn btn-danger" onClick={clearStats}>清空统计</button>
                                    <button className="btn btn-secondary" onClick={goHome}>返回首页</button>
                                </div>
                                
                                {/* 大图预览 + 左右滑动 */}
                                {lightbox.open && lightbox.imgs.length > 0 && (
                                    <div 
                                        style={{position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.92)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column'}} 
                                        onClick={() => setLightbox({...lightbox, open: false})}
                                    >
                                        <div style={{position: 'absolute', top: '10px', right: '20px', color: '#fff', fontSize: '30px', cursor: 'pointer', zIndex: 1}} onClick={e => { e.stopPropagation(); setLightbox({...lightbox, open: false}); }}>×</div>
                                        {lightbox.imgs.length > 1 && (
                                            <>
                                                <div style={{position: 'absolute', left: '10px', top: '50%', transform: 'translateY(-50%)', color: '#fff', fontSize: '50px', cursor: 'pointer', zIndex: 1, userSelect: 'none'}} onClick={e => { e.stopPropagation(); prevImg(); }}>‹</div>
                                                <div style={{position: 'absolute', right: '10px', top: '50%', transform: 'translateY(-50%)', color: '#fff', fontSize: '50px', cursor: 'pointer', zIndex: 1, userSelect: 'none'}} onClick={e => { e.stopPropagation(); nextImg(); }}>›</div>
                                            </>
                                        )}
                                        <img 
                                            src={lightbox.imgs[lightbox.startIdx]?.url} 
                                            style={{maxWidth: '90vw', maxHeight: '80vh', objectFit: 'contain', borderRadius: '10px'}} 
                                            onClick={e => e.stopPropagation()} 
                                        />
                                        {lightbox.imgs.length > 1 && (
                                            <div style={{color: '#ccc', fontSize: '14px', marginTop: '10px'}}>{lightbox.startIdx + 1} / {lightbox.imgs.length}</div>
                                        )}
                                    </div>
                                )}
                            </div>
                        );
                    }
                }
            };
            
            return (
                <div>
                    {renderScreen()}
                    
                    {/* 反馈遮罩 */}
                    {feedback.show && (
                        <div className="feedback-overlay show">
                            <div className={`feedback-content ${feedback.correct ? 'correct' : 'wrong'}`}>
                                <div className="emoji">{feedback.correct ? '✅' : '❌'}</div>
                                <div>{feedback.message}</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
