// IndexedDB еӯҳеӮЁеұӮ
(function() {
    const DB_NAME = 'speech_contest_db';
    const DB_VERSION = 1;
    const STORE_GRADES = 'grades';
    const STORE_RESULTS = 'results';
    let dbInstance = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            if (dbInstance) { resolve(dbInstance); return; }
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => { dbInstance = request.result; resolve(dbInstance); };
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(STORE_GRADES)) db.createObjectStore(STORE_GRADES, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(STORE_RESULTS)) db.createObjectStore(STORE_RESULTS, { keyPath: 'id', autoIncrement: true });
            };
        });
    }

    function dbPut(storeName, data) {
        return new Promise((resolve, reject) => {
            openDB().then(db => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                const request = store.put(data);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            }).catch(reject);
        });
    }

    function dbGet(storeName, key) {
        return new Promise((resolve, reject) => {
            openDB().then(db => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            }).catch(reject);
        });
    }

    window.SpeechContestDB = {
        saveGrades: (grades) => dbPut(STORE_GRADES, { id: 'all', data: grades }),
        loadGrades: () => new Promise(resolve => { dbGet(STORE_GRADES, 'all').then(r => resolve(r ? r.data : null)).catch(() => resolve(null)); }),
        saveResults: (results) => dbPut(STORE_RESULTS, { id: 'all', data: results }),
        loadResults: () => new Promise(resolve => { dbGet(STORE_RESULTS, 'all').then(r => resolve(r ? r.data : [])).catch(() => resolve([])); }),
        clearAllData: () => new Promise((resolve, reject) => {
            openDB().then(db => {
                const tx = db.transaction([STORE_GRADES, STORE_RESULTS], 'readwrite');
                tx.objectStore(STORE_GRADES).clear();
                tx.objectStore(STORE_RESULTS).clear();
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }),
        openDB
    };
})();

                if (!selectedGrade) { console.log('selectedGradeдёәз©ә'); return; }
                
                const rounds = getGradeRounds();

                const currentRoundKey = rounds[currentRound];
                console.log('еҪ“еүҚзҺҜиҠӮ:', currentRoundKey, 'жҖ»зҺҜиҠӮ:', rounds);
                
                if (currentRoundKey === 'recognition') {

                        alert('иҜ·е…ҲеңЁеҗҺеҸ°ж·»еҠ и®ӨдёҖи®ӨеӣҫзүҮ');

                    setImageSelectCorrect(null);
                    setDiscriminationOptions([]);

                } else if (currentRoundKey === 'imageSelect') {

                    const allImgs = selectedGrade.imageSelect?.images || [];
                    // еҸӘдҪҝз”Ёжңүlabelзҡ„еӣҫзүҮ
                    const labeledImgs = allImgs.filter(img => img.label && img.label.trim());
                    
                    if (labeledImgs.length < 2) {

                    }
                    
                    // жҢүlabelеҲҶз»„
                    const labelMap = {};
                    labeledImgs.forEach(img => {

                    const availableLabels = Object.keys(labelMap).filter(l => !usedImageSelectLabels.has(l));

            const handleScore = (score, scoreKey) => {

                                                                else next.add(index);
                                                                setExpandedStudents(next);
                                                            }} style={{cursor: 'pointer'}}>
                                                                <div>
                                                                    <div className="name">{result.student} {isExpanded ? 'в–І' : 'в–ј'}</div>
                                                                    <div style={{fontSize: '12px', color: '#999'}}>{result.date}</div>
                                                                </div>
                                                                <div className="score">{result.total}еҲҶ</div>
                                                            </div>
                                                            {isExpanded && renderResultCard(result)}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="text-center">
                                    <button className="btn btn-danger" onClick={clearStats}>жё…з©әз»ҹи®Ў</button>
                                    <button className="btn btn-secondary" onClick={goHome}>иҝ”еӣһйҰ–йЎө</button>
                                </div>
                                
                                {/* еӨ§еӣҫйў„и§Ҳ + е·ҰеҸіж»‘еҠЁ */}
                                {lightbox.open && lightbox.imgs.length > 0 && (
                                    <div 
                                        style={{position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.92)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column'}} 
                                        onClick={() => setLightbox({...lightbox, open: false})}
                                    >
                                        <div style={{position: 'absolute', top: '10px', right: '20px', color: '#fff', fontSize: '30px', cursor: 'pointer', zIndex: 1}} onClick={e => { e.stopPropagation(); setLightbox({...lightbox, open: false}); }}>Г—</div>
                                        {lightbox.imgs.length > 1 && (
                                            <>
                                                <div style={{position: 'absolute', left: '10px', top: '50%', transform: 'translateY(-50%)', color: '#fff', fontSize: '50px', cursor: 'pointer', zIndex: 1, userSelect: 'none'}} onClick={e => { e.stopPropagation(); prevImg(); }}>вҖ№</div>
                                                <div style={{position: 'absolute', right: '10px', top: '50%', transform: 'translateY(-50%)', color: '#fff', fontSize: '50px', cursor: 'pointer', zIndex: 1, userSelect: 'none'}} onClick={e => { e.stopPropagation(); nextImg(); }}>вҖә</div>
                                            </>
                                        )}
                                        <img 
                                            src={lightbox.imgs[lightbox.startIdx]?.url} 
                                            style={{maxWidth: '90vw', maxHeight: '80vh', objectFit: 'contain', borderRadius: '10px'}} 
                                            onClick={e => e.stopPropagation()} 
                                        />
                                        {lightbox.imgs.length > 1 && (
                                            <div style={{color: '#ccc', fontSize: '14px', marginTop: '10px'}}>{lightbox.startIdx + 1} / {lightbox.imgs.length}</div>
                                        )}
                                    </div>
                                )}
                            </div>
                        );
                    }
                }
            };
            
            return (
                <div>
                    <input
                        ref={configInputRef}
                        type="file"
                        accept=".json"
                        style={{display: 'none'}}
                        onChange={onConfigFileChange}
                    />
                    {renderScreen()}

                    {/* еҸҚйҰҲйҒ®зҪ© */}
                    {feedback.show && (
                        <div className="feedback-overlay show">
                            <div className={`feedback-content ${feedback.correct ? 'correct' : 'wrong'}`}>
                                <div className="emoji">{feedback.correct ? 'вң…' : 'вқҢ'}</div>
                                <div>{feedback.message}</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
